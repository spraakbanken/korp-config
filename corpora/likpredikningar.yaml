id: likpredikningar
lang: swe
mode:
  - name: all_hist
description:
  swe: |-
    <b>En digitaliserad samling av drygt 1000 tryckta likpredikningar från 1600- och 1700-talet.</b><br><br><p>SKOLIK syftar på en samling av drygt 1000 tryckta likpredikningar från 1600- och 1700-talet som finns i
    Skoklosters slottsbibliotek. Samlingen har med stöd från Riksbankens jubileumsfond digitaliserats inom ramen
    för projektet <em>Från bokskåpet till skärmen. Digitalisering av likpredikningarna i Skoklosters
    slottsbibliotek</em>, ett samarbete mellan Stockholms universitet och Statens historiska museer. Likpredikningar
    är en värdefull källa för förståelsen av livet i Europa under tidigmodern tid. Att nästan hälften av
    predikningarna behandlar kvinnor som annars är starkt underrepresenterade i arkiven, gör samlingen särskilt
    relevant.</p>
    <p>De transkriberade texterna från SKOLIK-projektet finns nu tillgängliga i Korp. Korpusen kommer att
    uppdateras i takt med att ytterligare material ur samlingen av likpredikningar på Skoklosters slott
    transkriberas.</p>
    <p>Sök i samlingen på <a href="https://samlingar.shm.se/sok?type=object&amp;institution=Skoklosters%20slott&amp;category=Likpredikningar&amp;tid=skolik1">Statens historiska museers
    webbplats</a>
    eller läs mer om SKOLIK på <a href="https://www.su.se/forskning/forskningskatalog/forskningsprojekt/6/fran-bokskapet-till-skarmen.-digitalisering-av-likpredikningarna-i-skoklosters-slottsbibliotek">projektets
    webbplats</a>.</p>
  eng: |-
    <b>A digitized collection of just over 1,000 printed funeral sermons from the 17th and 18th centuries.</b><br><br><p>SKOLIK refers to a collection of just over 1,000 printed funeral sermons from the 17th and 18th centuries
    held in the library of Skokloster Castle. With funding from the Riksbankens Jubileumsfond, the collection
    has been digitized within the framework of the project <em>Från bokskåpet till skärmen. Digitalisering av
    likpredikningarna i Skoklosters slottsbibliotek</em>, a collaboration between Stockholm University and the
    National Historical Museums. Funeral sermons are a valuable source for understanding life in early modern
    Europe. The fact that nearly half of the sermons concern women—who are otherwise strongly underrepresented
    in the archives—makes the collection particularly significant.</p>
    <p>The transcribed texts from the SKOLIK project are now available in Korp. The corpus will be updated as
    additional material from the collection of funeral sermons at Skokloster Castle is transcribed.</p>
    <p>Search the collection on the <a href="https://samlingar.shm.se/sok?type=object&amp;institution=Skoklosters%20slott&amp;category=Likpredikningar&amp;tid=skolik1">National Historical Museums’
    website</a>
    or read more about SKOLIK on <a href="https://www.su.se/forskning/forskningskatalog/forskningsprojekt/6/fran-bokskapet-till-skarmen.-digitalisering-av-likpredikningarna-i-skoklosters-slottsbibliotek">the project
    website</a>.</p>
