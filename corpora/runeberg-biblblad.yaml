id: runeberg-biblblad
title: Biblioteksbladet
description:
  swe: |-
    <b>Projekt Runebergs elektroniska utgåva av de äldsta årgångarna av "Biblioteksbladet: Organ för Sveriges allmänna biblioteksförening", 1916–1940</b><br><br>Texten är hämtad från <a href="http://runeberg.org/biblblad/">Projekt
    Runeberg: Biblioteksbladet</a>, där den har korrekturlästs delvis av
    frivilliga användare.
  eng: |-
    <b>The earliest volumes of "Biblioteksbladet: Organ för Sveriges allmänna biblioteksförening" from 1916–1940, digitized by Project Runeberg</b><br><br>
    The text is from <a href="http://runeberg.org/biblblad/">Project Runeberg: Biblioteksbladet</a>, where it has partly been manually corrected by volunteer users.
