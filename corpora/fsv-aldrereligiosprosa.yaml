context:
  - label:
      eng: 1 paragraph
      swe: 1 stycke
    value: 1 paragraph
  - label:
      eng: 1 sentence
      swe: 1 mening
    value: 1 sentence
description: <a target="_blank" href="http://project2.sol.lu.se/fornsvenska/">Fornsvenska
  textbanken</a> är ett projekt som digitaliserar fornsvenska texter och gör dem tillgängliga
  över webben. Projektet leds av Lars-Olof Delsing vid Lunds universitet.
id: fsv-aldrereligiosprosa
mode:
  - folder: fsvb.aldre
    name: all_hist
  - folder: fsvb.aldre
    name: old_swedish
morphology: fsvm
pos_attributes:
  - posset:
      dataset:
        AB: AB
        DT: DT
        HA: HA
        HD: HD
        HP: HP
        HS: HS
        IE: IE
        IN: IN
        JJ: JJ
        KN: KN
        MID|MAD|PAD: DL
        NN: NN
        PC: PC
        PL: PL
        PM: PM
        PN: PN
        PP: PP
        PS: PS
        RG: RG
        RO: RO
        SN: SN
        UO: UO
        VB: VB
      extended_component: datasetSelect
      label:
        eng: homograph set
        swe: homografmängd
      opts:
        is: contains
        is_not: not contains
      translation:
        AB:
          eng: adverb
          swe: adverb
        DL:
          eng: punctuation
          swe: interpunktion
        DT:
          eng: determiner
          swe: determinerare
        E:
          eng: e
          swe: e
        HA:
          eng: interrogative/relative adverb
          swe: frågande/relativt adverb
        HD:
          eng: interrogative/relative determiner
          swe: frågande/relativ determinerare
        HP:
          eng: interrogative/relative pronoun
          swe: frågande/relativt pronomen
        HS:
          eng: interrogative/relative possessive
          swe: frågande/relativt possesivt pronomen
        IE:
          eng: infinitive marker
          swe: infinitivmärke
        IN:
          eng: interjection
          swe: interjektion
        JJ:
          eng: adjective
          swe: adjektiv
        KN:
          eng: conjunction
          swe: konjunktion
        MAD:
          eng: punctuation
          swe: interpunktion
        MID:
          eng: punctuation
          swe: interpunktion
        MID|MAD|PAD:
          eng: punctuation
          swe: interpunktion
        NN:
          eng: noun
          swe: substantiv
        PAD:
          eng: punctuation
          swe: interpunktion
        PC:
          eng: participle
          swe: particip
        PL:
          eng: particle
          swe: partikel
        PM:
          eng: proper noun
          swe: egennamn
        PN:
          eng: pronoun
          swe: pronomen
        PP:
          eng: preposition
          swe: preposition
        PS:
          eng: possessive
          swe: possessivt pronomen
        RG:
          eng: cardinal number
          swe: grundtal
        RO:
          eng: ordinal number
          swe: ordningstal
        SN:
          eng: subjunction
          swe: subjunktion
        UO:
          eng: foreign word
          swe: utländskt ord
        VB:
          eng: verb
          swe: verb
      type: set
  - variants:
      extended_component:
        name: autocExtended
        options:
          error_on_empty: true
          type: lemgram
      external_search: https://spraakbanken.gu.se/karp/?mode=saldom&lexicon=saldom&query=and(equals|lemgram|"<%=
        val.replace(/:\d+/, '') %>")
      internal_search: true
      label:
        eng: similar lemgram
        swe: närliggande lemgram
      opts:
        is: contains
        is_not: not contains
      stringify: lemgram
      type: set
  - lemma:
      extended_template: <input ng-model='model' >
      label:
        eng: baseform
        swe: grundform
      opts:
        is: contains
        is_not: not contains
      type: set
  - lex:
      extended_component:
        name: autocExtended
        options:
          error_on_empty: true
          type: lemgram
      external_search: https://spraakbanken.gu.se/karp/?mode=saldom&lexicon=saldom&query=and(equals|lemgram|"<%=
        val.replace(/:\d+/, '') %>")
      internal_search: true
      label: lemgram
      opts:
        is: contains
        is_not: not contains
      stringify: lemgram
      type: set
struct_attributes:
  - text_title:
      extended_component: structServiceSelect
      label:
        eng: title
        swe: titel
  - text_date: date
title:
  swe: 'Fornsvenska textbankens material: Äldre religiös prosa'
  eng: 'Fornsvenska textbankens material: Äldre religiös prosa'
within:
  - label:
      eng: sentence
      swe: mening
    value: sentence
