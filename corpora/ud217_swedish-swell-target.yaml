description:
  swe: |-
    <b>En parallell Universal Dependencies-trädbank baserad på SweLL (Swedish Learner Language-korpusen).</b><br><br><p>Denna delkorpus innehåller meningarna från de korrigerade inlärartexterna.</p>
    <p>UD_Swedish-SweLL är en parallell Universal Dependencies-trädbank baserad på
    <a href="https://spraakbanken.gu.se/resources/swell">SweLL</a> (Swedish Learner Language-korpusen). Den första versionen, som
    släpps i samband med UD 2.17, består av 510 meningar parade med sina korrigerade versioner. Meningarna är
    slumpmässigt utvalda från <a href="https://spraakbanken.gu.se/resurser/swell-gold">SweLL-gold</a>, en samling uppsatser
    skrivna av vuxna inlärare av svenska som andraspråk. För mer information om trädbanken, se <a href="https://github.com/UniversalDependencies/UD_Swedish-SweLL/blob/master/README.md">den officiella
    README-filen</a>.</p>
  eng: |-
    <b>A parallel Universal Dependencies treebank based on SweLL, the Swedish Learner Language corpus.</b><br><br><p>This subcorpus contains the sentences from the corrected learner texts.</p>
    <p>UD_Swedish-SweLL is a parallel Universal Dependencies treebank based on
    <a href="https://spraakbanken.gu.se/resurser/swell">SweLL</a>, the Swedish Learner Language corpus. Its first version,
    released as part of UD 2.17, consists of 510 randomly selected sentence-correction pairs from
    <a href="https://spraakbanken.gu.se/en/resources/swell-gold">SweLL-gold</a>, a corpus of essays written by adult learners of
    Swedish as a second language (L2). For more information about the treebank, see <a href="https://github.com/UniversalDependencies/UD_Swedish-SweLL/blob/master/README.md">the official README
    file</a>. </p>
